version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# MongoDB 7.0 — Config Server Replica Set (nodo único)
#
# Corre en la EC2 principal junto con la app Django.
# El configsvr almacena los metadatos del cluster sharded.
#
# NOTA: mongos se arranca manualmente por deploy.sh usando la IP del contenedor
# en lugar del hostname.  Esto es necesario porque en MongoDB 7.0 el balancer
# del mongos usa read preference "nearest" para refrescar config.settings, y
# la resolución de hostname puede fallar en el pool interno de conexiones del
# balancer aunque el DNS de Docker funcione correctamente desde mongosh.
#
# Secuencia de inicialización (manejada automáticamente por deploy.sh):
#   1. docker compose up  →  levanta configsvr1
#   2. rs.initiate(...)   →  inicializa el RS con host temporal (hostname)
#   3. CONFIGSVR_IP=$(docker inspect configsvr1 ...)
#   4. rs.reconfig(...)   →  cambia host al IP real del contenedor
#   5. config.settings pre-poblado (balancer + autosplit)
#   6. docker run mongos  →  --configdb rs_config/$CONFIGSVR_IP:27019
# ─────────────────────────────────────────────────────────────────────────────

networks:
  mongo_net:
    driver: bridge

services:
  # ── Config Server nodo 1 ──────────────────────────────────────
  configsvr1:
    image: mongo:7.0
    container_name: configsvr1
    command: mongod --configsvr --replSet rs_config --port 27019 --bind_ip_all
    ports:
      - "27019:27019"
    networks: [mongo_net]
    volumes:
      - configsvr1_data:/data/db
    restart: unless-stopped

  # mongos se arranca manualmente en deploy.sh (ver nota arriba).
  # No se define aquí para poder pasarle la IP real de configsvr1 en runtime.

volumes:
  configsvr1_data:
