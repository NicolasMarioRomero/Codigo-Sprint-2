version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# MongoDB 7.0 — Config Server Replica Set (nodo único, host network)
#
# IMPORTANTE: usa network_mode: host para evitar problemas de resolución DNS
# en el balancer del mongos. Con Docker bridge, sh.addShard() falla con:
#   "Could not find host matching read preference { mode: 'nearest' } for set rs_config"
# porque el pool interno del balancer no resuelve el hostname del contenedor.
#
# Con host network, configsvr1 queda en la IP privada real del EC2
# (ej. 172.31.x.x), que siempre es alcanzable desde cualquier proceso
# corriendo en la misma máquina — incluido el pool interno del balancer.
#
# deploy.sh se encarga de:
#   1. docker compose up  →  levanta configsvr1 en host network
#   2. rs.initiate(...)   →  inicia el RS con la IP privada del EC2
#   3. config.settings pre-poblado (balancer + autosplit)
#   4. docker run mongos  →  también en host network, apunta a IP privada
# ─────────────────────────────────────────────────────────────────────────────

services:
  configsvr1:
    image: mongo:7.0
    container_name: configsvr1
    network_mode: host
    command: mongod --configsvr --replSet rs_config --port 27019 --bind_ip_all
    volumes:
      - configsvr1_data:/data/db
    restart: unless-stopped

  # mongos se arranca manualmente en deploy.sh con --network host
  # para que use la IP privada del EC2 como configdb.

volumes:
  configsvr1_data:
