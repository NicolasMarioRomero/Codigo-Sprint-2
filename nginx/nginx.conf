# nginx.conf — Load Balancer para el Report Service
# Táctica: Balanceo de carga + Múltiples copias de procesamiento
# ASR Latencia: soportar 5000 usuarios concurrentes en < 3s

events {
    worker_connections 4096;
}

http {
    # Definición del upstream (2 instancias del Report Service)
    upstream report_service {
        least_conn;                    # Algoritmo: menor cantidad de conexiones activas
        server report_service_1:8000;  # Instancia 1
        server report_service_2:8000;  # Instancia 2
        keepalive 64;                  # Conexiones persistentes para reducir overhead
    }

    server {
        listen 80;

        # Timeouts ajustados para cumplir el SLA de 3s
        proxy_connect_timeout 2s;
        proxy_send_timeout    3s;
        proxy_read_timeout    3s;

        location / {
            proxy_pass         http://report_service;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /health {
            proxy_pass http://report_service;
        }
    }
}
