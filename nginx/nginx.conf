# nginx.conf — Load Balancer + Frontend estático
# Táctica: Balanceo de carga + Múltiples copias de procesamiento
# ASR Latencia: dashboard < 3s bajo 5000 usuarios concurrentes

worker_processes auto;           # Un worker por CPU disponible
worker_rlimit_nofile 65535;

events {
    worker_connections  8192;    # Aumentado para soportar 5000 usuarios
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Optimizaciones de red
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    # Timeouts ajustados para cumplir el SLA de 3s
    keepalive_timeout     65;
    keepalive_requests   100;
    proxy_connect_timeout  2s;
    proxy_send_timeout     3s;
    proxy_read_timeout     3s;

    # Compresión gzip (reduce tamaño de respuesta)
    gzip on;
    gzip_types application/json text/plain application/javascript text/css;
    gzip_min_length 1024;

    # Definición del upstream (2 instancias del Report Service)
    # Táctica: Balanceo de carga + Múltiples copias de procesamiento
    # Corren directamente en EC2: uvicorn en puerto 8000 y 8002
    upstream report_service {
        least_conn;                    # Algoritmo: menor cantidad de conexiones activas
        server 127.0.0.1:8000;         # Instancia 1 (bite-backend-1.service)
        server 127.0.0.1:8002;         # Instancia 2 (bite-backend-2.service)
        keepalive 128;                 # Conexiones persistentes para reducir overhead
    }

    server {
        listen 80;

        # ── Frontend estático ──────────────────────────────
        location / {
            root  /home/ubuntu/app/frontend;
            index index.html;
            try_files $uri $uri/ /index.html;
            # Cache de archivos estáticos
            expires 1h;
            add_header Cache-Control "public";
        }

        # ── API del Report Service (load balanced) ─────────
        location /api/ {
            proxy_pass         http://report_service;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Health check directo ───────────────────────────
        location /health {
            proxy_pass         http://report_service;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # ── API del Extractor (agente cloud) ──────────────
        location /extractor/ {
            proxy_pass         http://127.0.0.1:8001/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 60s;   # Extractor puede tardar por reintentos
        }

        # ── FastAPI Docs del Backend (debug) ───────────────
        location /docs {
            proxy_pass         http://report_service/docs;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        location /openapi.json {
            proxy_pass         http://report_service/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }
    }
}
