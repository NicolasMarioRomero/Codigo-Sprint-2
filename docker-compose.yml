version: "3.9"

# ============================================================
# BITE - Experimento Sprint 3
# Arquitectura: Microservicios + Load Balancer + Caché
# ASR Latencia:     dashboard < 3s bajo 5000 usuarios
# ASR Escalabilidad: extractor agnóstico con 100% de éxito
# ============================================================

services:

  # ── Infraestructura compartida ──────────────────────────

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cloudcosts
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── ASR Latencia: 2 instancias del Report Service ──────

  report_service_1:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/cloudcosts
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  report_service_2:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/cloudcosts
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Load Balancer (táctica: balanceo de carga) ─────────

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - report_service_1
      - report_service_2
    restart: unless-stopped

  # ── ASR Escalabilidad: Extractor Agent ────────────────

  extractor:
    build:
      context: ./Extractor
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  extractor_worker:
    build:
      context: ./Extractor
      dockerfile: Dockerfile
    command: >
      celery -A app.tasks.extract_task.celery_app worker
      --loglevel=info
      --concurrency=4
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
