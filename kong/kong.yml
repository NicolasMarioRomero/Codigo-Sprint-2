# kong/kong.yml — Disponibilidad ASR
# Kong declarative config (DB-less mode, Kong 3.x)
# Health checks activos + circuit breaker para el experimento de disponibilidad.
#
# Deploy: KONG_DATABASE=off KONG_DECLARATIVE_CONFIG=/etc/kong/kong.yml kong start

_format_version: "3.0"
_transform: true

# ── Upstreams con health checks ───────────────────────────────────────────────
upstreams:
  - name: bite_upstream
    algorithm: round-robin
    healthchecks:
      active:
        concurrency: 5
        healthy:
          interval: 5          # verificar cada 5 s
          successes: 2         # 2 éxitos para marcar como healthy
        unhealthy:
          interval: 5
          http_failures: 3     # 3 fallas HTTP → unhealthy
          tcp_failures: 3
          timeouts: 3
        http_path: /places/health/
        type: http
      passive:
        healthy:
          successes: 5
        unhealthy:
          http_failures: 5
          timeouts: 5

    targets:
      # Nodo principal de la app Django
      - target: app1:8000
        weight: 100
      # Nodo de respaldo
      - target: app2:8000
        weight: 100

# ── Servicios ─────────────────────────────────────────────────────────────────
services:
  - name: bite-places
    host: bite_upstream
    port: 8000
    protocol: http
    connect_timeout: 3000
    write_timeout: 10000
    read_timeout: 10000
    retries: 3
    routes:
      - name: places-route
        paths:
          - /places
        strip_path: false
        methods:
          - GET
          - POST
          - DELETE

  - name: bite-credentials
    host: bite_upstream
    port: 8000
    protocol: http
    connect_timeout: 3000
    write_timeout: 10000
    read_timeout: 10000
    retries: 2
    routes:
      - name: credentials-route
        paths:
          - /credentials
        strip_path: false
        methods:
          - GET
          - POST

  - name: bite-test
    host: bite_upstream
    port: 8000
    protocol: http
    routes:
      - name: test-route
        paths:
          - /test
        strip_path: false

# ── Plugins globales ─────────────────────────────────────────────────────────
plugins:
  # Circuit breaker via proxy-cache (fallback 503 si el upstream está caído)
  - name: proxy-cache
    config:
      response_code: [200, 201]
      request_method: [GET]
      content_type: [application/json]
      cache_ttl: 30
      strategy: memory

  # Rate limiting para el experimento de volumen (ASR29)
  - name: rate-limiting
    config:
      minute: 300
      hour: 10000
      policy: local
      fault_tolerant: true
      hide_client_headers: false

  # Request logging
  - name: file-log
    config:
      path: /var/log/kong/access.log
      reopen: true
